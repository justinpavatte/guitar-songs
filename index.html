<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Guitar Songs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 28px; }
    a { display: block; padding: 12px 0; font-size: 20px; text-transform: capitalize; }
  </style>
</head>
<body>
  <h1>Guitar Songs</h1>
  <div id="songs"></div>

  <script>
    const songs = [
      "example-song.pdf"
    ];

    const box = document.getElementById("songs");

    songs.forEach(file => {
      const a = document.createElement("a");
      a.href = "songs/" + file;
      a.textContent = file.replace(".pdf", "").replaceAll("-", " ");
      box.appendChild(a);
    });
  </script>
</body>
</html>
